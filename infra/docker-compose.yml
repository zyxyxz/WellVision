services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wellvision
      POSTGRES_USER: wellvision
      POSTGRES_PASSWORD: wellvision
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellvision -d wellvision"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${WELLVISION_MINIO_API_PORT:-19000}:9000"
      - "${WELLVISION_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb -p local/wellvision-raw || true;
      /usr/bin/mc anonymous set private local/wellvision-raw || true;
      "

  backend:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload"
    volumes:
      - ../backend:/app
    environment:
      ENV: development
      APP_NAME: WellVision
      SECRET_KEY: local-dev-secret-key-please-change
      DATABASE_URL: postgresql+psycopg://wellvision:wellvision@postgres:5432/wellvision
      AUTO_CREATE_SCHEMA: "true"
      OBJECT_STORE_PROVIDER: s3
      OBJECT_STORE_BUCKET: wellvision-raw
      OBJECT_STORE_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:18080,http://127.0.0.1:18080
      BOOTSTRAP_TENANT_NAME: Default Tenant
      BOOTSTRAP_ADMIN_EMAIL: admin@wellvision.io
      BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: localhost,127.0.0.1,::1,postgres,redis,minio,backend,frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm ci &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8010
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: localhost,127.0.0.1,::1,postgres,redis,minio,backend,frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${WELLVISION_WEB_PORT:-18080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:
